<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scarica InZona</title>
  <meta name="description" content="Scarica InZona su App Store o Google Play. Segnalazioni locali in tempo reale nella tua zona.">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#2F4F4F">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://appinzona.com/download">
  <meta property="og:locale" content="it_IT">
  <meta property="og:site_name" content="InZona">
  <meta property="og:title" content="Scarica InZona">
  <meta property="og:description" content="Scarica InZona su App Store o Google Play. Segnalazioni locali in tempo reale nella tua zona.">

  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body class="download-body">
  <div class="page-bg download-page-bg" aria-hidden="true"></div>

  <main class="download-page">
    <a class="download-logo" href="./" aria-label="InZona — torna al sito">
      <img
        class="download-logo__img"
        src="apple-touch-icon.png"
        width="96"
        height="96"
        alt=""
      >
      <span class="download-logo__name">InZona</span>
      <span class="download-logo__tagline">Vicino a te</span>
    </a>

    <div class="download-actions">
      <a
        id="btn-apple"
        class="download-btn download-btn--apple"
        href="https://apps.apple.com/it/app/inzona-vicino-a-te/id6765660950"
        rel="noopener"
      >
        <svg class="download-btn__icon" viewBox="0 0 384 512" aria-hidden="true">
          <path fill="currentColor" d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 25 223.8 25 272.7c0 38.7 7.2 110.9 45.6 157.9 17.9 24.2 41.5 51.4 71.5 50.8 29.4-.5 40.5-19.1 74.4-19.1 33.8 0 43.8 19.1 74.4 18.8 30.9-.3 52.7-26.8 71.3-51 23.1-32.5 32.5-64 33-65.5-2.9-1.3-64.5-24.7-65.1-98.1zM256.3 85.9c16.3-19.7 27.3-47.1 24.3-74.4-23.6 1-52.2 15.7-69.1 35.5-15.1 17.4-28.3 45.2-24.8 71.9 26.2 2 53.3-13.7 69.6-33.1z"/>
        </svg>
        <span class="download-btn__copy">
          <span class="download-btn__small">Scarica su</span>
          <span class="download-btn__large">App Store</span>
        </span>
      </a>

      <a
        id="btn-google"
        class="download-btn download-btn--google"
        href="https://play.google.com/store/apps/details?id=com.istant.app"
        rel="noopener"
      >
        <svg class="download-btn__icon" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5Z"/>
          <path fill="currentColor" d="M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12Z"/>
          <path fill="currentColor" d="M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.53,12.9 20.18,13.18L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81Z"/>
          <path fill="currentColor" d="M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z"/>
        </svg>
        <span class="download-btn__copy">
          <span class="download-btn__small">Disponibile su</span>
          <span class="download-btn__large">Google Play</span>
        </span>
      </a>

      <a
        id="btn-review"
        class="download-btn download-btn--review"
        href="#"
      >
        <svg class="download-btn__icon download-btn__icon--star" viewBox="0 0 256 256" aria-hidden="true">
          <path fill="currentColor" d="M234.29,114.85l-45,38.83L203,211.75a16.4,16.4,0,0,1-24.5,17.82L128,198.49,77.47,229.57A16.4,16.4,0,0,1,53,211.75l13.76-58.07-45-38.83A16.46,16.46,0,0,1,31.08,86l59-4.76,22.76-55.08a16.36,16.36,0,0,1,30.27,0l22.75,55.08,59,4.76a16.46,16.46,0,0,1,9.37,28.86Z"/>
        </svg>
        <span class="download-btn__copy">
          <span class="download-btn__small">Ti piace InZona?</span>
          <span class="download-btn__large">Lascia una recensione</span>
        </span>
      </a>
    </div>

    <p id="download-hint" class="download-hint" hidden></p>

    <p class="download-footer">
      <a href="./">Torna al sito</a>
    </p>
  </main>

  <script>
    (function () {
      var STORES = {
        apple: {
          downloadWeb: "https://apps.apple.com/it/app/inzona-vicino-a-te/id6765660950",
          downloadApp: "itms-apps://apps.apple.com/app/id6765660950",
          reviewWeb: "https://apps.apple.com/app/id6765660950?action=write-review",
          reviewApp: "itms-apps://itunes.apple.com/app/viewContentsUserReviews/id6765660950?action=write-review"
        },
        google: {
          downloadWeb: "https://play.google.com/store/apps/details?id=com.istant.app",
          downloadApp: "market://details?id=com.istant.app",
          reviewWeb: "https://play.google.com/store/apps/details?id=com.istant.app&showAllReviews=true",
          reviewApp: "market://details?id=com.istant.app&showAllReviews=true"
        }
      };

      var ua = navigator.userAgent || "";
      var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      var isAndroid = /Android/i.test(ua);
      var isMobile = isIOS || isAndroid;
      var platform = isIOS ? "apple" : isAndroid ? "google" : null;

      var btnApple = document.getElementById("btn-apple");
      var btnGoogle = document.getElementById("btn-google");
      var btnReview = document.getElementById("btn-review");
      var hint = document.getElementById("download-hint");

      function storeUrl(type, action) {
        var store = STORES[type];
        var key = action + (isMobile ? "App" : "Web");
        return store[key];
      }

      function openUrl(url, fallback) {
        if (isMobile && fallback) {
          window.location.href = url;
          setTimeout(function () {
            window.location.href = fallback;
          }, 1500);
          return;
        }
        window.location.href = url;
      }

      btnApple.href = storeUrl("apple", "download");
      btnGoogle.href = storeUrl("google", "download");

      btnReview.addEventListener("click", function (event) {
        event.preventDefault();
        if (platform === "apple") {
          openUrl(STORES.apple.reviewApp, STORES.apple.reviewWeb);
        } else if (platform === "google") {
          openUrl(STORES.google.reviewApp, STORES.google.reviewWeb);
        } else {
          var pick = window.confirm(
            "Su quale store hai scaricato InZona?\n\nOK = App Store (iPhone/iPad)\nAnnulla = Google Play (Android)"
          );
          window.location.href = pick
            ? STORES.apple.reviewWeb
            : STORES.google.reviewWeb;
        }
      });

      if (platform) {
        var storeName = platform === "apple" ? "App Store" : "Google Play";
        hint.hidden = false;
        hint.textContent = "Rilevato " + (platform === "apple" ? "iPhone/iPad" : "Android") + " — i link aprono " + storeName + ".";

        var params = new URLSearchParams(window.location.search);
        var shouldRedirect = params.get("stay") !== "1" && !sessionStorage.getItem("download-stay");
        var redirectTimer = null;

        if (shouldRedirect) {
          var redirectUrl = storeUrl(platform, "download");
          var fallback = STORES[platform].downloadWeb;
          hint.textContent = "Reindirizzamento a " + storeName + "…";

          var cancelLink = document.createElement("button");
          cancelLink.type = "button";
          cancelLink.className = "download-hint__cancel";
          cancelLink.textContent = "Resta qui";
          hint.appendChild(document.createTextNode(" "));
          hint.appendChild(cancelLink);

          cancelLink.addEventListener("click", function () {
            if (redirectTimer) {
              clearTimeout(redirectTimer);
              redirectTimer = null;
            }
            sessionStorage.setItem("download-stay", "1");
            hint.textContent = "Rilevato " + (platform === "apple" ? "iPhone/iPad" : "Android") + " — i link aprono " + storeName + ".";
            cancelLink.remove();
          });

          redirectTimer = setTimeout(function () {
            openUrl(redirectUrl, fallback);
          }, 1200);
        }
      }
    })();
  </script>
</body>
</html>
