<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-itunes-app" content="app-id=0000000000, app-argument=https://inzona.netlify.app/post/" />
    <title>Segnalazione su InZona</title>
    <meta name="description" content="Apri questa segnalazione su InZona — segnalazioni locali vicino a te." />
    <link rel="icon" href="/assets/favicon.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .post-landing {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem 3rem;
        text-align: center;
      }
      .post-card {
        width: min(420px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 1.5rem;
        padding: 2rem 1.75rem;
        margin-top: 2rem;
      }
      .post-card h1 {
        font-size: 1.5rem;
        margin: 1rem 0 0.75rem;
      }
      .post-card p {
        color: var(--muted);
        line-height: 1.6;
        margin-bottom: 1.5rem;
      }
      .post-actions {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .post-note {
        margin-top: 1.25rem;
        font-size: 0.875rem;
        color: var(--muted);
        line-height: 1.5;
      }
      .post-logo {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        font-weight: 700;
        font-size: 1.125rem;
        color: var(--text);
        text-decoration: none;
      }
      .post-logo img {
        border-radius: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="bg-glow" aria-hidden="true"></div>
    <div class="bg-grid" aria-hidden="true"></div>

    <main class="post-landing">
      <a class="post-logo" href="/">
        <img src="/assets/icon.png" alt="" width="40" height="40" />
        <span>InZona</span>
      </a>

      <div class="post-card">
        <p class="eyebrow" style="justify-content: center">
          <span class="pulse-dot"></span>
          Segnalazione condivisa
        </p>
        <h1>Apri in InZona</h1>
        <p id="post-message">
          Qualcuno ha condiviso una segnalazione locale. Apri l'app per vederla nel feed geolocalizzato.
        </p>
        <div class="post-actions">
          <a class="btn" href="#" id="open-app">Apri nell'app</a>
          <a class="btn btn-ghost" href="/#scarica">Scarica InZona</a>
        </div>
        <p class="post-note" id="post-note">
          Se l'app non si apre, scaricala e poi tocca di nuovo questo link dopo l'accesso.
        </p>
      </div>
    </main>

    <script src="post.js"></script>
  </body>
</html>
